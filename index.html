<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTI integration</title>
  <meta name="author" content="Lloyd Goveia">
  <meta name="description" content="Service Cloud Widget POC created by Lloyd Goveia. Provided AS IS with no support.">

  <!-- bootstrap-->
  <link href="bootstrap_min.css" rel="stylesheet">
  <script src="bootstrap_bundle_min.js"></script>
  <link href="icons/bootstrap-icons.css" rel="stylesheet">


  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style-login.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">
  <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
  <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>
  <script defer src="script.js"></script>
  <script>




    $(function () {
      $("#userMenu").hide();
      $("#enablePoll").checkboxradio();
      $("#uiHome").hide();

      //buttons
      $("#End").hide();
      $("#uiControls").hide();


      $.widget("custom.iconselectmenu", $.ui.selectmenu, {
        _renderItem: function (ul, item) {
          var li = $("<li>"),
            wrapper = $("<div>", { text: item.label });

          if (item.disabled) {
            li.addClass("ui-state-disabled");
          }

          $("<span>", {
            style: item.element.attr("data-style"),
            "class": "ui-icon " + item.element.attr("data-class")
          })
            .appendTo(wrapper);

          return li.append(wrapper).appendTo(ul);
        }
      });

      $("#uiState")
        .iconselectmenu({
          change: function (event, data) {
            handleState();
          }
        })
        .iconselectmenu("menuWidget")
        .addClass("ui-menu-icons")






      // ✅ Search filter (resets pages)
      document.getElementById("searchBox").addEventListener("input", searchContact);



    });

  </script>
  <style>
    .ready-sel::before {
      content: "✔ ";
      color: green;
    }

    #main-content {
      padding: 20px 0 0 20px
    }


    .form {
      display: grid;
      grid-template-columns: 1fr;
      /* Defines 1 single column */
      grid-template-rows: repeat(5, auto);
      /* Creates 5 rows */
      gap: 15px;
      /* Adds space between the rows */
      max-width: 250px;
    }

    .form-row input {
      width: 100%;
      /* Ensures input fills the row width */
    }

    .state-not-ready {
      background-image: url(http://download.jqueryui.com/themeroller/images/ui-icons_ff0000_256x240.png) !important;

    }

    .state-ready {
      background-image: url(http://download.jqueryui.com/themeroller/images/ui-icons_43a942_256x240.png) !important;
    }



    .btn-icon {
      background-image: url(https://download.jqueryui.com/themeroller/images/ui-icons_ffffff_256x240.png) !important;
    }

    .contactDesc {
      color: rgb(91, 91, 91);
      font-size: 14px;
    }

    .contactPhone {
      color: rgb(50, 50, 50);
      font-size: 14px;
      padding-left: 5px;
    }


    .contactName {
      font-size: 12px;
    }


    .phone-transfer {
      color: #0d6efd;
      font-size: 20px;
      display: inline-block;

    }

    .phone-transfer:hover {
      animation: moveRight 1s infinite;
    }


    /* sliding effect (transfer direction) */
    @keyframes moveRight {
      0% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(6px);
      }

      100% {
        transform: translateX(0);
      }
    }


    .form-control:hover {
      box-shadow: 0 0 8px rgba(13, 110, 253, 0.5);
      /* blue glow */
    }


    .pagination-wrapper {
      max-width: 300px;
      margin: 0 auto;
    }


    /* Disable responsiveness */
    body {
      min-width: 300px;
      /* forces desktop layout */
    }

    /* Fixed height container */
    .tab-content {
      height: 70vh;
      /*fixed height */
      padding: 15px;
      overflow-y: auto;
      /* scroll if content overflows */
    }
  </style>

 <style>
    .dial-btn {
      width: 80px;
      height: 80px;
      font-size: 1.5rem;
      border-radius: 30%;
    }
    .dial-container {
      max-width: 300px;
      margin: 10px auto;
    }
    .display {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #ccc;
      padding: 10px;
    }
  </style>

</head>

<body>

  <!-- Header -->
  <nav class="navbar navbar-expand fiori-navbar">
    <div class="container-fluid">

      <!--   Logo -->

      <a class="navbar-brand d-flex align-items-center" href="#">
        <!--<img src="https://upload.wikimedia.org/wikipedia/commons/5/59/SAP_2011_logo.svg" height="28" class="me-2">  -->
        <span class="brand-text">CBS Finesse Integration</span>
      </a>

      <!-- Toggle -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menu -->
      <div class="collapse navbar-collapse" id="mainMenu">

        <ul class="navbar-nav ms-4">

          <!--  <li class="nav-item">
            <a class="nav-link active" href="#">Transfer</a>
          </li> -->

          <!-- Dropdown -->
          <!--  <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
              Applications
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Finance</a></li>
              <li><a class="dropdown-item" href="#">HR</a></li>
              <li><a class="dropdown-item" href="#">Supply Chain</a></li>
            </ul>
          </li> -->

          <!-- <li class="nav-item">
            <a class="nav-link" href="#">Reports</a>
          </li> -->

        </ul>

        <!-- Right Side -->

        <div class="d-flex align-items-center ms-auto">


          <ul class="navbar-nav ms-auto align-items-center">


            <!-- User Menu -->
            <li class="nav-item dropdown" id="userMenu">
              <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle me-2"></i> Sign Out
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#" onClick="handleLogOut(94)">Break</a></li>
                <li><a class="dropdown-item" href="#" onClick="handleLogOut(96)">End of Shift</a></li>
                <li><a class="dropdown-item" href="#" onClick="handleLogOut(95)">Lunch</a></li>
                <li><a class="dropdown-item" href="#" onClick="handleLogOut(93)">Meeting</a></li>
                <!-- <li>
                  <hr class="dropdown-divider">
                </li> -->

              </ul>
            </li>

          </ul>

        </div>
      </div>
  </nav>


  <div id="main-content">

    <div id="uiLogIn" class="fiori-card-wrapper">
      <div class="card fiori-card">

        <div class="card-body">

          <div class="form" class="login-input">
            <label>Username:</label><input type="text" id="username" class="form-control mb-3" value="">
            <label>Password:</label><input type="password" id="pwd" class="form-control mb-3" value="">
            <label>Extension:</label><input type="text" id="ext" class="form-control mb-3" value="">
            <button id="login" type="submit" onClick="handleLogIn()" class=" btn btn-fiori">Log In</button>
          </div>


        </div>

      </div>
    </div>








    <div class="card mt-4" id="uiHome">
      <div class="card-header">
        <ul class="nav nav-tabs card-header-tabs">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#t1">Agent</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#t2">Transfer</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#t3">Dial Pad</button>
          </li>
        </ul>
      </div>
      <div id="uiCTI" class="card-body tab-content">
        <div class="tab-pane fade show active" id="t1">

          <div class="container py-4">
            <div class="row g-4">

              <!-- Card 1 -->
              <div class="col-md-4">
                <div class="card fiori-card p-3">
                  <div class="d-flex align-items-center mb-3">
                    <div class="fiori-icon me-3"><i class="bi-person-workspace"></i></div>
                    <div class="fiori-header">State</div>
                  </div>

                  <select name="uiState" id="uiState">
                    <option value="" data-class="state-not-ready ui-icon-bullet">Not Ready</option>
                    <option value="40" data-class="state-not-ready ui-icon-bullet">Break/Lunch</option>
                    <option value="42" data-class="state-not-ready ui-icon-bullet">Personal</option>
                    <option value="43" data-class="state-not-ready ui-icon-bullet">Meeting</option>
                    <option value="44" data-class="state-not-ready ui-icon-bullet">Training</option>
                    <option value="READY" data-class="state-ready ui-icon-bullet">Ready</option>
                  </select>

                </div>
              </div>

              <!-- Card 2 -->
              <div id="uiControls" class="col-md-4">
                <div class="card fiori-card p-3">
                  <div class="d-flex align-items-center mb-3">
                    <div class="fiori-icon me-3"><i class="bi bi-mic"></i></div>
                    <div class="fiori-header">Call Controls</div>
                  </div>

                  <!-- <span   class="ui-icon ui-icon-zoomin btn-icon"></span>-->
                  <div class="form-row"><button id="Accept" onClick="handleAnswer()" class=" btn btn-fiori">Caller's
                      Account</button></div>
                  <div class="form-row"><button id="End" onClick="handleEnd()" class=" btn btn-fiori"><span
                        class="ui-icon ui-icon-close btn-icon"></span>End Call</button></div>


                </div>
              </div>



            </div>
          </div>






          <!--
  <fieldset>
    <legend>Automatic Polling: </legend>
    <label for="enablePoll">Enabled</label>
    <input type="checkbox" name="enablePoll" id="enablePoll" onClick="handlePoll()">
    <label id="countPoll"></label>
  </fieldset>
-->



        </div>
        <div class="tab-pane fade" id="t2">



          <div class="container mt-4">


            <div class="card shadow">

              <!-- Header + Search -->
              <div class="card-header">
                <input type="text" id="searchBox" class="form-control" placeholder="Search contacts...">
              </div>

              <!-- List -->
              <ul id="listGroup" class="list-group list-group-flush"></ul>


              <!-- Pagination -->
              <div class="card-footer">
                <nav>
                  <ul id="pagination" class="pagination justify-content-center mb-0"></ul>
                </nav>
              </div>


            </div>




          </div>



        </div>




        <div class="tab-pane fade" id="t3">

          <div class="container py-4">
            <div class="row g-4">

              <!-- Card 1 -->
              <div class="col-md-4">
                <div class="card fiori-card p-3">
                  <!-- <div class="d-flex align-items-center mb-3">
                    <div class="fiori-icon me-3"><i class="bi-person-workspace"></i></div>
                    <div class="fiori-header">Dial Pad</div>
                  </div> -->

                  <div class="dial-container text-center">

                    <!-- Display -->
                    <div id="display" class="display"></div>

                    <!-- Dial Pad -->
                    <div class="d-grid gap-3">

                      <div class="d-flex justify-content-between">
                        <button class="btn btn-light dial-btn" onclick="press('1')">1</button>
                        <button class="btn btn-light dial-btn" onclick="press('2')">2</button>
                        <button class="btn btn-light dial-btn" onclick="press('3')">3</button>
                      </div>

                      <div class="d-flex justify-content-between">
                        <button class="btn btn-light dial-btn" onclick="press('4')">4</button>
                        <button class="btn btn-light dial-btn" onclick="press('5')">5</button>
                        <button class="btn btn-light dial-btn" onclick="press('6')">6</button>
                      </div>

                      <div class="d-flex justify-content-between">
                        <button class="btn btn-light dial-btn" onclick="press('7')">7</button>
                        <button class="btn btn-light dial-btn" onclick="press('8')">8</button>
                        <button class="btn btn-light dial-btn" onclick="press('9')">9</button>
                      </div>

                      <div class="d-flex justify-content-between">
                        <button class="btn btn-light dial-btn" onclick="press('*')">*</button>
                        <button class="btn btn-light dial-btn" onclick="press('0')">0</button>
                        <button class="btn btn-light dial-btn" onclick="press('#')">#</button>
                      </div>

                      <!-- Actions -->
                      <div class="d-flex justify-content-between mt-3">
                        <button class="btn btn-danger dial-btn" onclick="backspace()">
                          <i class="bi bi-backspace"></i>
                        </button>

                        <button class="btn btn-success dial-btn" onclick="call()">
                          <i class="bi bi-telephone-fill"></i>
                        </button>
                      </div>

                    </div>
                  </div>

                </div>
              </div>

            </div>
          </div>



          <!-- <label>Cookie Name:</label><input type="text" id="cookieName" class="form-control mb-3" value="">
          <button class="" onClick="handleCookie()">Get</button>
          <p id="cookieVal"></p> -->
        </div>




      </div>




    </div>


  </div>
  </div>
  </div> <!--main content-->



  <script>
    function press(num) {
      document.getElementById("display").innerText += num;
    }

    function backspace() {
      let display = document.getElementById("display");
      display.innerText = display.innerText.slice(0, -1);
    }

    function call() {
      alert("Calling " + document.getElementById("display").innerText);
    }
  </script>


</body>

</html>
